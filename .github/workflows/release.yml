name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write  # required to create GitHub Releases and upload assets

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git describe works correctly

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: make release
        env:
          VERSION: ${{ steps.tag.outputs.tag }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum task-* > checksums.txt
          echo "=== checksums ==="
          cat checksums.txt

      - name: Verify all artefacts exist
        run: |
          for f in dist/task-darwin-arm64 dist/task-darwin-amd64 dist/task-linux-amd64 dist/checksums.txt; do
            if [[ ! -f "$f" ]]; then
              echo "error: missing artefact $f" >&2
              exit 1
            fi
          done

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Delete existing release if rerunning (idempotent)
          gh release delete "${TAG}" --yes 2>/dev/null || true

          gh release create "${TAG}" \
            --title "task-cli ${TAG}" \
            --generate-notes \
            dist/task-darwin-arm64 \
            dist/task-darwin-amd64 \
            dist/task-linux-amd64 \
            dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
